<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nota" />
  <meta name="description" content="Şık ve hızlı not tutma uygulaması" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Nota</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223b;
      --accent: #e8c547;
      --accent2: #ff6b6b;
      --accent3: #4ecdc4;
      --text: #f0eeff;
      --text2: #9898bb;
      --border: rgba(255,255,255,0.07);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 18px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, var(--bg) 70%, transparent);
      padding: 52px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px; font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-count {
      font-size: 13px; color: var(--text2);
      background: var(--surface2);
      padding: 4px 12px; border-radius: 20px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      padding: 0 20px 12px;
      position: sticky; top: 100px; z-index: 99;
    }
    .search-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px 12px 42px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }
    .search-box::placeholder { color: var(--text2); }
    .search-box:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute; left: 34px; top: 50%; transform: translateY(-50%);
      color: var(--text2); pointer-events: none; font-size: 16px;
    }

    /* ── CATEGORY CHIPS ── */
    .cats-wrap {
      padding: 0 20px 16px;
      display: flex; gap: 8px; overflow-x: auto;
      scrollbar-width: none;
    }
    .cats-wrap::-webkit-scrollbar { display: none; }
    .cat-chip {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px; font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .cat-chip.active {
      background: var(--accent);
      color: #1a1a2e;
      border-color: var(--accent);
      font-weight: 700;
    }

    /* ── NOTE GRID ── */
    .notes-grid {
      padding: 0 20px 120px;
      columns: 2;
      column-gap: 12px;
    }
    @media (max-width: 360px) { .notes-grid { columns: 1; } }

    .note-card {
      break-inside: avoid;
      margin-bottom: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      position: relative;
      animation: cardIn .25s ease both;
    }
    .note-card:active { transform: scale(0.97); }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .note-card.pinned::before {
      content: '📌';
      position: absolute; top: 10px; right: 12px;
      font-size: 12px;
    }
    .note-color-bar {
      height: 3px; border-radius: 3px;
      margin-bottom: 10px;
    }
    .note-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
      word-break: break-word;
    }
    .note-preview {
      font-size: 13px; color: var(--text2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .note-meta {
      margin-top: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .note-date { font-size: 11px; color: var(--text2); }
    .note-tag {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
      background: rgba(255,255,255,0.07);
      color: var(--text2);
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text2);
    }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(28px + env(safe-area-inset-bottom)); right: 24px;
      width: 58px; height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #f0a500);
      border: none;
      font-size: 26px; color: #1a1a2e;
      box-shadow: 0 6px 24px rgba(232,197,71,0.4);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, box-shadow .15s;
      z-index: 200;
    }
    .fab:active { transform: scale(0.92); box-shadow: 0 3px 12px rgba(232,197,71,0.3); }

    /* ── MODAL OVERLAY ── */
    .overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ── EDITOR SHEET ── */
    .editor-sheet {
      width: 100%;
      max-height: 94dvh;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,1.2,.56,1);
      overflow: hidden;
    }
    .overlay.open .editor-sheet { transform: translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .sheet-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 8px;
      flex-shrink: 0;
    }
    .sheet-actions { display: flex; gap: 8px; }

    .btn-icon {
      width: 38px; height: 38px;
      border-radius: 12px;
      background: var(--surface2);
      border: none; cursor: pointer;
      color: var(--text2);
      font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .btn-icon:active { opacity: 0.7; }
    .btn-icon.danger:active { background: var(--accent2); color: white; }
    .btn-icon.pin-active { background: var(--accent); color: #1a1a2e; }

    .btn-save {
      background: var(--accent);
      color: #1a1a2e;
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      height: 38px;
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-save:active { opacity: 0.8; }

    /* Color picker */
    .color-picker {
      display: flex; gap: 8px; padding: 0 16px 10px;
      flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
    }
    .color-picker::-webkit-scrollbar { display: none; }
    .color-dot {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer; flex-shrink: 0;
      transition: transform .15s, border-color .15s;
    }
    .color-dot.selected { border-color: white; transform: scale(1.2); }

    /* Category select */
    .tag-select-wrap {
      padding: 0 16px 10px;
      flex-shrink: 0;
      display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
    }
    .tag-select-wrap::-webkit-scrollbar { display: none; }
    .tag-btn {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 16px;
      font-size: 12px; font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }
    .tag-btn.active {
      background: var(--accent3);
      color: #0f0f1a;
      border-color: var(--accent3);
      font-weight: 700;
    }

    .editor-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 700;
      background: transparent; border: none;
      color: var(--text);
      padding: 6px 16px;
      width: 100%; outline: none;
      flex-shrink: 0;
    }
    .editor-title::placeholder { color: var(--text2); }

    .editor-body {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; line-height: 1.65;
      background: transparent; border: none;
      color: var(--text);
      padding: 6px 16px 24px;
      width: 100%; outline: none;
      resize: none;
      flex: 1;
      min-height: 160px;
    }
    .editor-body::placeholder { color: var(--text2); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(96px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px; color: var(--text);
      z-index: 500;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* scrollable editor content */
    .editor-scroll {
      overflow-y: auto;
      flex: 1;
      display: flex; flex-direction: column;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">Nota</div>
  <div class="header-count" id="noteCount">0 not</div>
</div>

<!-- SEARCH -->
<div class="search-wrap" style="position:relative;">
  <span class="search-icon">🔍</span>
  <input class="search-box" id="searchInput" type="search" placeholder="Notlarda ara…" oninput="renderNotes()" />
</div>

<!-- CATEGORY CHIPS -->
<div class="cats-wrap" id="catsWrap"></div>

<!-- NOTES GRID -->
<div class="notes-grid" id="notesGrid"></div>

<!-- FAB -->
<button class="fab" onclick="openEditor()">＋</button>

<!-- EDITOR OVERLAY -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="editor-sheet" id="editorSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-toolbar">
      <div class="sheet-actions">
        <button class="btn-icon" id="pinBtn" onclick="togglePin()" title="Sabitle">📌</button>
        <button class="btn-icon danger" id="deleteBtn" onclick="deleteNote()" title="Sil">🗑️</button>
      </div>
      <button class="btn-save" onclick="saveNote()">Kaydet</button>
    </div>
    <!-- Color picker -->
    <div class="color-picker" id="colorPicker"></div>
    <!-- Tag selector -->
    <div class="tag-select-wrap" id="tagSelector"></div>
    <!-- Scrollable content -->
    <div class="editor-scroll">
      <input class="editor-title" id="editorTitle" type="text" placeholder="Başlık…" maxlength="80" />
      <textarea class="editor-body" id="editorBody" placeholder="Notunu buraya yaz…" rows="8"></textarea>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────
const COLORS = ['#e8c547','#ff6b6b','#4ecdc4','#a29bfe','#fd79a8','#55efc4','#fdcb6e','#74b9ff','#b8e994','#dfe6e9'];
const TAGS = ['Hepsi','Kişisel','İş','Fikir','Yapılacak','Önemli'];
const STORAGE_KEY = 'nota_notes_v2';

let notes = [];
let activeTag = 'Hepsi';
let editingId = null;
let editorColor = COLORS[0];
let editorTag = '';
let editorPinned = false;

function load() {
  try { notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { notes = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
}

// ── RENDER ────────────────────────────────────────────
function renderCats() {
  const wrap = document.getElementById('catsWrap');
  wrap.innerHTML = TAGS.map(t =>
    `<div class="cat-chip${t===activeTag?' active':''}" onclick="setTag('${t}')">${t}</div>`
  ).join('');
}

function setTag(t) {
  activeTag = t;
  renderCats();
  renderNotes();
}

function renderNotes() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = notes;
  if (activeTag !== 'Hepsi') filtered = filtered.filter(n => n.tag === activeTag);
  if (query) filtered = filtered.filter(n =>
    (n.title||'').toLowerCase().includes(query) ||
    (n.body||'').toLowerCase().includes(query)
  );
  // pinned first
  filtered = [...filtered.filter(n=>n.pinned), ...filtered.filter(n=>!n.pinned)];

  const grid = document.getElementById('notesGrid');
  const count = document.getElementById('noteCount');
  count.textContent = notes.length + ' not';

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty" style="column-span:all">
      <div class="empty-icon">${query ? '🔍' : '📝'}</div>
      <div class="empty-title">${query ? 'Sonuç bulunamadı' : 'Henüz not yok'}</div>
      <div style="font-size:14px;margin-top:6px;color:var(--text2)">${query ? 'Farklı bir şey dene' : 'Yeni not eklemek için + tuşuna bas'}</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(n => `
    <div class="note-card${n.pinned?' pinned':''}" onclick="openEditor('${n.id}')">
      <div class="note-color-bar" style="background:${n.color||COLORS[0]}"></div>
      ${n.title ? `<div class="note-title">${esc(n.title)}</div>` : ''}
      ${n.body  ? `<div class="note-preview">${esc(n.body)}</div>` : ''}
      <div class="note-meta">
        <span class="note-date">${fmtDate(n.updatedAt)}</span>
        ${n.tag ? `<span class="note-tag">${n.tag}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  if (d.toDateString()===now.toDateString()) {
    return d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  }
  const diff = Math.floor((now-d)/86400000);
  if (diff===1) return 'dün';
  if (diff<7) return diff+' gün önce';
  return d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'});
}

// ── EDITOR ────────────────────────────────────────────
function buildColorPicker() {
  document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
    `<div class="color-dot${c===editorColor?' selected':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function pickColor(c) {
  editorColor = c;
  buildColorPicker();
}

function buildTagSelector() {
  document.getElementById('tagSelector').innerHTML = TAGS.slice(1).map(t =>
    `<div class="tag-btn${t===editorTag?' active':''}" onclick="pickTag('${t}')">${t}</div>`
  ).join('');
}
function pickTag(t) {
  editorTag = editorTag===t ? '' : t;
  buildTagSelector();
}

function openEditor(id) {
  editingId = id || null;
  const note = id ? notes.find(n=>n.id===id) : null;
  editorColor = note ? (note.color||COLORS[0]) : COLORS[Math.floor(Math.random()*COLORS.length)];
  editorTag = note ? (note.tag||'') : (activeTag!=='Hepsi' ? activeTag : '');
  editorPinned = note ? !!note.pinned : false;

  document.getElementById('editorTitle').value = note ? (note.title||'') : '';
  document.getElementById('editorBody').value  = note ? (note.body||'')  : '';
  document.getElementById('deleteBtn').style.display = id ? 'flex' : 'none';
  document.getElementById('pinBtn').className = 'btn-icon' + (editorPinned ? ' pin-active' : '');

  buildColorPicker();
  buildTagSelector();

  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>{ document.getElementById(note?.title?'editorBody':'editorTitle').focus(); },350);
}

function closeEditor() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeEditor();
}

function togglePin() {
  editorPinned = !editorPinned;
  document.getElementById('pinBtn').className = 'btn-icon' + (editorPinned ? ' pin-active' : '');
}

function saveNote() {
  const title = document.getElementById('editorTitle').value.trim();
  const body  = document.getElementById('editorBody').value.trim();
  if (!title && !body) { showToast('Not boş olamaz'); return; }

  const now = Date.now();
  if (editingId) {
    const idx = notes.findIndex(n=>n.id===editingId);
    if (idx>=0) {
      notes[idx] = { ...notes[idx], title, body, color: editorColor, tag: editorTag, pinned: editorPinned, updatedAt: now };
    }
  } else {
    notes.unshift({ id: 'n'+now, title, body, color: editorColor, tag: editorTag, pinned: editorPinned, createdAt: now, updatedAt: now });
  }
  save(); renderNotes(); closeEditor();
  showToast(editingId ? '✅ Not güncellendi' : '✅ Not kaydedildi');
}

function deleteNote() {
  if (!editingId) return;
  if (!confirm('Bu notu silmek istediğine emin misin?')) return;
  notes = notes.filter(n=>n.id!==editingId);
  save(); renderNotes(); closeEditor();
  showToast('🗑️ Not silindi');
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── KEYBOARD: save on Ctrl+Enter ─────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') saveNote();
  if (e.key==='Escape') closeEditor();
});

// ── SWIPE DOWN TO CLOSE ───────────────────────────────
let touchStartY = 0;
document.getElementById('editorSheet').addEventListener('touchstart', e=>{
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('editorSheet').addEventListener('touchend', e=>{
  if (e.changedTouches[0].clientY - touchStartY > 80) closeEditor();
}, {passive:true});

// ── INIT ──────────────────────────────────────────────
load();
renderCats();
renderNotes();

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
